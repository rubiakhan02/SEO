<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rank Checker</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fff7ed;
        color: #7c2d12;
      }

      .wrap {
        width: 320px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      p {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Incognito Access Required</h1>
      <p>
        Please enable incognito access for this extension. Go to chrome://extensions, click
        Details on the Rank Checker extension, and turn on Allow in Incognito. Then reload the
        extension.
      </p>
    </div>
  </body>
</html>
